name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt
      - run: ruff check custom_components/ tests/ poc/
      - run: ruff format --check custom_components/ tests/ poc/
      - run: pytest tests/ -v
