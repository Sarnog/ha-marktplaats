blueprint:
  name: Marktplaats - melding bij nieuwe advertentie (iOS)
  description: >
    Stuurt een pushmelding naar de HA Companion App (iOS) zodra de
    Marktplaats-integratie een nieuwe, matchende advertentie vindt
    (`marktplaats_new_listing`-event). Je kiest alleen naar welk toestel de
    melding moet - titel, prijs, locatie, link en foto worden automatisch
    ingevuld, geen sjablonen typen nodig. Tikken op de melding zelf opent de
    advertentie (in de Marktplaats-app indien geïnstalleerd, anders in de
    browser).


    Gebruikt Home Assistant's ingebouwde "device notify"-actie
    (`domain: mobile_app`), dezelfde die ook achter een keuzemenu met
    toestelnamen zit in andere notificatie-blueprints - dat lost zelf de
    juiste, klassieke notify-service voor het gekozen toestel op (inclusief
    foto-ondersteuning).


    iOS kent, anders dan Android, geen meldingskanalen (waarbij je vooraf in
    de Companion App een kanaal met een eigen ringtone/prioriteit aanmaakt).
    Het dichtstbijzijnde alternatief is een aangepast geluidsbestand: voeg
    dat eerst toe via de Companion App (Instellingen > Meldingen > Geluiden)
    en vul hieronder de bestandsnaam in.
  domain: automation
  source_url: https://github.com/Sarnog/ha-marktplaats/blob/main/blueprints/automation/marktplaats/new_listing_notify_ios.yaml
  input:
    marktplaats_search:
      name: Zoekopdracht
      description: >
        Beperk deze automation tot één specifieke Marktplaats-zoekopdracht.
        Leeg laten om op elke zoekopdracht te reageren.
      default: ""
      selector:
        config_entry:
          integration: marktplaats
    notify_device:
      name: Telefoon
      description: >
        Het toestel dat de melding moet ontvangen. Moet de officiële Home
        Assistant Companion App draaien.
      selector:
        device:
          integration: mobile_app
    notify_sound:
      name: Aangepast geluid (optioneel, iOS)
      description: >
        Bestandsnaam van een aangepast meldingsgeluid dat je al hebt
        toegevoegd via de Companion App (Instellingen > Meldingen >
        Geluiden). iOS kent geen kanalen zoals Android; dit is het
        dichtstbijzijnde alternatief voor een eigen ringtone specifiek voor
        Marktplaats-meldingen. Leeg laten voor het standaardgeluid.
      default: ""
      selector:
        text: {}

triggers:
  - trigger: event
    event_type: marktplaats_new_listing

actions:
  - variables:
      marktplaats_search_id: !input marktplaats_search
      notify_sound: !input notify_sound
      listing_price_text: >-
        {{ ("€ " ~ ('%.2f' | format(trigger.event.data.price_cents / 100) | replace('.', ',')))
        if trigger.event.data.price_cents is not none
        else (trigger.event.data.price_type or '') }}
      listing_subtitle: >-
        {{ [listing_price_text, trigger.event.data.location] | select
        | join(' · ') }}
      listing_message: >-
        {{ [listing_subtitle, trigger.event.data.url] | select | join('\n') }}
  - if:
      - condition: template
        value_template: >-
          {{ marktplaats_search_id and trigger.event.data.entry_id !=
          marktplaats_search_id }}
    then:
      - stop: Advertentie hoort niet bij de geselecteerde zoekopdracht
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: "{{ trigger.event.data.title }}"
    message: "{{ listing_message }}"
    data: >-
      {{ dict(image=(trigger.event.data.image_url or ''), url=trigger.event.data.url,
      **(dict(push=dict(sound=notify_sound)) if notify_sound else {})) }}
