blueprint:
  name: Marktplaats - melding bij nieuwe advertentie
  description: >
    Stuurt een melding zodra de Marktplaats-integratie een nieuwe, matchende
    advertentie vindt (`marktplaats_new_listing`-event). Je hoeft alleen aan
    te geven wĂ©lke actie de melding moet versturen - titel, prijs, locatie,
    link en foto worden automatisch ingevuld, geen sjablonen typen nodig.


    Kies bij "Melding-actie" ofwel een **notify-actie naar je telefoon**
    (bv. `notify.mobile_app_telefoon`) - dan wordt titel en bericht
    automatisch ingevuld (geen foto, want de moderne notify-entity-service
    ondersteunt sinds Home Assistant's notify-entity-herontwerp geen
    foto-bijlage meer, zie ROADMAP.md in de integratie's repo), ofwel een
    **eigen script** (bv. `script.stuur_notificatie`) - dan krijgt dat
    script de gegevens mee als variabelen (`title`, `message`, `price`,
    `location`, `url`, `image_url`) die je er zelf in kunt gebruiken, inclusief
    de foto. Dit gebeurt via `script.turn_on` met `variables:`, dus de
    verplichte `fields:` van je eigen script worden hier *niet* op
    gecontroleerd - heeft je script een verplicht veld waar deze blueprint
    geen equivalent voor heeft (bv. een meldingskanaal of een specifieke
    ontvanger, iets wat een Marktplaats-advertentie nu eenmaal niet
    aanlevert), geef dat veld dan in je eigen script een vaste
    standaardwaarde (bv. `{{ mijn_veld | default('Notify') }}`), anders
    crasht je script zodra dit veld ontbreekt.
  domain: automation
  source_url: https://github.com/Sarnog/ha-marktplaats/blob/main/blueprints/automation/marktplaats/new_listing_notify.yaml
  input:
    marktplaats_search:
      name: Zoekopdracht
      description: >
        Beperk deze automation tot Ă©Ă©n specifieke Marktplaats-zoekopdracht.
        Leeg laten om op elke zoekopdracht te reageren.
      default: ""
      selector:
        config_entry:
          integration: marktplaats
    notify_target:
      name: Melding-actie
      description: >
        Een notify-actie (bv. `notify.mobile_app_telefoon`) of een script
        (bv. `script.stuur_notificatie`) dat de melding verstuurt. Zie de
        beschrijving hierboven voor wat elk van de twee krijgt.
      selector:
        entity:
          domain:
            - notify
            - script
    extra_script_data:
      name: Extra instellingen voor je script (optioneel)
      description: >
        Alleen relevant als je hierboven een **script** hebt gekozen met
        eigen verplichte velden waar deze blueprint geen equivalent voor
        heeft (bv. een meldingskanaal of een specifieke ontvanger - Home
        Assistant ondersteunt geen velden die alleen verschijnen als je een
        script kiest, dus dit veld staat er altijd, maar negeer het gerust
        bij een gewone `notify.mobile_app_*`-actie). Vul hier extra
        sleutel/waarde-paren in die als losse variabelen aan je script
        worden meegegeven, bovenop `title`/`message`/`price`/`location`/
        `url`/`image_url` - bv. `message_channel: Notify` en
        `ontvanger: danny`.
      default: {}
      selector:
        object: {}

triggers:
  - trigger: event
    event_type: marktplaats_new_listing

actions:
  - variables:
      marktplaats_search_id: !input marktplaats_search
      notify_target_id: !input notify_target
      extra_script_data: !input extra_script_data
      listing_price_text: >-
        {{ ("â‚¬ " ~ ('%.2f' | format(trigger.event.data.price_cents / 100) | replace('.', ',')))
        if trigger.event.data.price_cents is not none
        else (trigger.event.data.price_type or '') }}
      listing_subtitle: >-
        {{ [listing_price_text, trigger.event.data.location] | select
        | join(' Â· ') }}
      listing_message: >-
        {{ [listing_subtitle, trigger.event.data.url] | select | join('\n') }}
  - if:
      - condition: template
        value_template: >-
          {{ marktplaats_search_id and trigger.event.data.entry_id !=
          marktplaats_search_id }}
    then:
      - stop: Advertentie hoort niet bij de geselecteerde zoekopdracht
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_target_id.split('.')[0] == 'script' }}"
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ notify_target_id }}"
            data:
              variables: >-
                {{ dict(title=trigger.event.data.title, message=listing_message,
                price=listing_price_text, location=trigger.event.data.location,
                url=trigger.event.data.url, image_url=trigger.event.data.image_url,
                **extra_script_data) }}
    default:
      - action: notify.send_message
        target:
          entity_id: "{{ notify_target_id }}"
        data:
          title: "{{ trigger.event.data.title }}"
          message: "{{ listing_message }}"
