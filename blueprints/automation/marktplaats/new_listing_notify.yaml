blueprint:
  name: Marktplaats - melding bij nieuwe advertentie
  description: >
    Stuurt een melding zodra de Marktplaats-integratie een nieuwe, matchende
    advertentie vindt (`marktplaats_new_listing`-event). Je hoeft alleen aan
    te geven wélke actie de melding moet versturen - titel, prijs, locatie,
    link en foto worden automatisch ingevuld, geen sjablonen typen nodig.


    Kies bij "Melding-actie" ofwel een **notify-actie naar je telefoon**
    (bv. `notify.mobile_app_telefoon`) - dan wordt titel en bericht
    automatisch ingevuld (geen foto, want de moderne notify-entity-service
    ondersteunt sinds Home Assistant's notify-entity-herontwerp geen
    foto-bijlage meer, zie ROADMAP.md in de integratie's repo), ofwel een
    **eigen script** (bv. `script.stuur_notificatie`) - dan krijgt dat
    script de gegevens mee als variabelen (`title`, `message`, `price`,
    `location`, `url`, `image_url`) die je er zelf in kunt gebruiken, inclusief
    de foto.
  domain: automation
  source_url: https://github.com/Sarnog/ha-marktplaats/blob/main/blueprints/automation/marktplaats/new_listing_notify.yaml
  input:
    marktplaats_search:
      name: Zoekopdracht
      description: >
        Beperk deze automation tot één specifieke Marktplaats-zoekopdracht.
        Leeg laten om op elke zoekopdracht te reageren.
      default: ""
      selector:
        config_entry:
          integration: marktplaats
    notify_target:
      name: Melding-actie
      description: >
        Een notify-actie (bv. `notify.mobile_app_telefoon`) of een script
        (bv. `script.stuur_notificatie`) dat de melding verstuurt. Zie de
        beschrijving hierboven voor wat elk van de twee krijgt.
      selector:
        entity:
          domain:
            - notify
            - script

triggers:
  - trigger: event
    event_type: marktplaats_new_listing

actions:
  - variables:
      marktplaats_search_id: !input marktplaats_search
      notify_target_id: !input notify_target
      listing_price_text: >-
        {{ ("€ " ~ ('%.2f' | format(trigger.event.data.price_cents / 100) | replace('.', ',')))
        if trigger.event.data.price_cents is not none
        else (trigger.event.data.price_type or '') }}
      listing_subtitle: >-
        {{ [listing_price_text, trigger.event.data.location] | select
        | join(' · ') }}
      listing_message: >-
        {{ [listing_subtitle, trigger.event.data.url] | select | join('\n') }}
  - if:
      - condition: template
        value_template: >-
          {{ marktplaats_search_id and trigger.event.data.entry_id !=
          marktplaats_search_id }}
    then:
      - stop: Advertentie hoort niet bij de geselecteerde zoekopdracht
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_target_id.split('.')[0] == 'script' }}"
        sequence:
          - action: script.turn_on
            data:
              entity_id: "{{ notify_target_id }}"
              variables:
                title: "{{ trigger.event.data.title }}"
                message: "{{ listing_message }}"
                price: "{{ listing_price_text }}"
                location: "{{ trigger.event.data.location }}"
                url: "{{ trigger.event.data.url }}"
                image_url: "{{ trigger.event.data.image_url }}"
    default:
      - action: notify.send_message
        data:
          entity_id: "{{ notify_target_id }}"
          title: "{{ trigger.event.data.title }}"
          message: "{{ listing_message }}"
